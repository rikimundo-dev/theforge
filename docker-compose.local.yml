# Perfil local full-docker (sin Dokploy / Traefik).
# Uso: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
#
# App: http://localhost:8080  (nginx proxy /api → theforge-api)
# API directa (debug): http://localhost:3000
# Adminer: http://localhost:8081

services:
  theforge-api:
    ports:
      - "3000:3000"
    networks:
      - default

  theforge-web:
    ports:
      - "8080:80"
    networks:
      - default
    volumes:
      - ./apps/web/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]

  theforge-mcp:
    networks:
      - default

  theforge-adminer:
    ports:
      - "8081:8080"
    networks:
      - default
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/ 2>/dev/null | grep -qi adminer || exit 1",
        ]

networks:
  dokploy-network: !reset null
