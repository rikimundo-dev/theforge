# Perfil Coolify (sin red externa dokploy-network).
# Uso en CLI: docker compose -f docker-compose.yml -f docker-compose.coolify.yml up --build
#
# En Coolify: apunta el Compose al repo y usa el mismo merge de archivos, o pega ambos paths
# si la UI lo permite. Routing en Coolify (Traefik/Caddy):
#   - Dominio / → servicio theforge-web:80
#   - Path /api → servicio theforge-api:3000 (strip prefix /api)
#
# Si Coolify expone un solo dominio sin path split, monta nginx.local.conf en theforge-web
# (descomenta el bloque volumes de theforge-web abajo) y enruta todo el tráfico al web.

services:
  theforge-api:
    networks:
      - default

  theforge-web:
    networks:
      - default
    # Descomenta si prefieres un solo dominio (web hace proxy /api) en lugar de path routing:
    # volumes:
    #   - ./apps/web/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]

  theforge-mcp:
    networks:
      - default

  theforge-adminer:
    networks:
      - default
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/ 2>/dev/null | grep -qi adminer || exit 1",
        ]

networks:
  dokploy-network: !reset null
