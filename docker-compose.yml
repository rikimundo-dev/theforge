# TheForge — Docker Compose (Coolify / prod por defecto)
# Stack: Postgres + Redis (BullMQ) + FalkorDB (grafo SDD) + API + Web + MCP + Adminer
#
# Coolify (v4+): apunta solo a este archivo. Dominio → theforge-web:80.
# nginx.local.conf hace proxy /api/ → theforge-api:3000 (un solo dominio, sin path split).
#
# Otros perfiles:
#   Local full-docker:  docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
#   Dokploy:            docker compose -f docker-compose.yml -f docker-compose.dokploy.yml up --build
#   Ver docs/DEPLOY-COOLIFY.md y README-LOCAL.md
#
# Imágenes base: ECR Public en Dockerfiles. Override pulls: POSTGRES_IMAGE, REDIS_IMAGE en .env.

networks:
  default:
    driver: bridge

services:
  theforge-db:
    image: ${POSTGRES_IMAGE:-public.ecr.aws/docker/library/postgres:15-alpine}
    networks:
      - default
    environment:
      POSTGRES_USER: theforge
      POSTGRES_PASSWORD: theforge
      POSTGRES_DB: theforge
    volumes:
      - theforge_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U theforge -d theforge"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Grafo SDD (MDD, entregables, RAG agéntico). Aislado del índice de código en TheForge.
  # Cola BullMQ (cascada generate-deliverables). Sin Redis de cola, REDIS_URL vacío fuerza modo síncrono.
  theforge-redis-queue:
    image: ${REDIS_IMAGE:-public.ecr.aws/docker/library/redis:7-alpine}
    networks:
      - default
    volumes:
      - theforge_redis_queue_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  theforge-falkor-sdd:
    image: falkordb/falkordb:latest
    networks:
      - default
    volumes:
      - falkor_sdd_data:/var/lib/falkordb/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  theforge-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        BUILD_CACHE_BUST: ${BUILD_CACHE_BUST:-96}
    env_file:
      - path: .env
        required: false
    networks:
      - default
    environment:
      DATABASE_URL: postgresql://theforge:theforge@theforge-db:5432/theforge
      REDIS_URL: ${REDIS_URL:-redis://theforge-redis-queue:6379}
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-replace-in-production}
      FALKORDB_SDD_URL: redis://theforge-falkor-sdd:6379
      FALKORDB_URL: redis://theforge-falkor-sdd:6379
      AGENT_EVALUATOR_LEGACY: ${AGENT_EVALUATOR_LEGACY:-}
      TOKEN_MASTER_KEYS: ${TOKEN_MASTER_KEYS:-}
      TOKEN_ACTIVE_KEY_VERSION: ${TOKEN_ACTIVE_KEY_VERSION:-1}
      OPENAI_EMBEDDING_DIM: ${OPENAI_EMBEDDING_DIM:-}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-}
      LLM_DEBUG: ${LLM_DEBUG:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      # THEFORGE_MCP_URL / MCP_AUTH_TOKEN / MCP_X_M2M_TOKEN: no usar ${VAR:-} aquí (quedan
      # como "" y pueden anular env_file). Definirlas en `.env` o en Environment de Coolify.
      THEFORGE_MCP_TIMEOUT_MS: ${THEFORGE_MCP_TIMEOUT_MS:-60000}
      DEBUG_MCP: ${DEBUG_MCP:-0}
      PRISMA_RESOLVE_ROLLED_BACK: ${PRISMA_RESOLVE_ROLLED_BACK:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-0}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://${WEB_DOMAIN:-theforge.local},https://theforge.kreoint.mx,http://localhost:5173,http://127.0.0.1:5173}
      MCP_M2M_SECRET: ${MCP_M2M_SECRET:-}
      HERMES_WEBHOOK_URL: ${HERMES_WEBHOOK_URL:-}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      WIPE_BYOK_ON_START: ${WIPE_BYOK_ON_START:-}
    depends_on:
      theforge-db:
        condition: service_healthy
      theforge-redis-queue:
        condition: service_healthy
      theforge-falkor-sdd:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

  # Web: estáticos + proxy /api → API (nginx.local.conf). Coolify: un dominio → :80.
  theforge-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        BUILD_CACHE_BUST: ${BUILD_CACHE_BUST:-96}
    networks:
      - default
    depends_on:
      - theforge-api
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3

  # MCP server — optional (profile `mcp`). Enable with COMPOSE_PROFILES=mcp in Coolify.
  theforge-mcp:
    profiles:
      - mcp
    build:
      context: .
      dockerfile: packages/mcp-server/Dockerfile
      args:
        BUILD_CACHE_BUST: ${BUILD_CACHE_BUST:-96}
    networks:
      - default
    depends_on:
      theforge-api:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      THEFORGE_API_URL: "http://theforge-api:3000"
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # Adminer — gestor BD (solo interno o detrás de auth)
  theforge-adminer:
    image: adminer:4.8.1
    networks:
      - default
    depends_on:
      theforge-db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: theforge-db
      ADMINER_DEFAULT_USERNAME: theforge
      ADMINER_DEFAULT_DRIVER: pgsql
      ADMINER_DEFAULT_DB: theforge
      ADMINER_DESIGN: nette
    expose:
      - "8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/ 2>/dev/null | grep -qi adminer || exit 1",
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  theforge_db_data:
  theforge_redis_queue_data:
  falkor_sdd_data:
