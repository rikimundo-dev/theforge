# Dokploy: db + api + web + FalkorDB (grafo SDD documental; TheForge MCP es externo)
# Dominios en Dokploy: / → theforge-web:80, /api → theforge-api:3000 (Strip Path: sí)
# Si falla "network dokploy-network not found", quitar la red externa (Isolated Deployments)
# default con name evita que Compose cree una red *_default extra (reduce agotamiento de address pools)

networks:
  default:
    name: theforge-app-network
    driver: bridge
  dokploy-network:
    external: true

services:
  theforge-db:
    image: postgres:15-alpine
    container_name: theforge-db
    networks:
      - default
    environment:
      POSTGRES_USER: theforge
      POSTGRES_PASSWORD: theforge
      POSTGRES_DB: theforge
    volumes:
      - theforge_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U theforge -d theforge"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Grafo SDD (MDD, entregables, RAG agéntico). Aislado del índice de código en TheForge.
  # Cola BullMQ (cascada generate-deliverables). Opcional: sin este servicio, REDIS_URL vacío → modo síncrono.
  theforge-redis-queue:
    image: redis:7-alpine
    container_name: theforge-redis-queue
    networks:
      - default
    volumes:
      - theforge_redis_queue_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  theforge-falkor-sdd:
    image: falkordb/falkordb:latest
    container_name: theforge-falkor-sdd
    networks:
      - default
    ports:
      - "6380:6379"
    volumes:
      - falkor_sdd_data:/var/lib/falkordb/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  theforge-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: theforge-api
    networks:
      - default
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.theforge-api.rule=Host(`${WEB_DOMAIN:-theforge.local}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.theforge-api.priority=100"
      - "traefik.http.routers.theforge-api.entrypoints=websecure"
      - "traefik.http.routers.theforge-api.tls.certResolver=letsencrypt"
      - "traefik.http.services.theforge-api.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.theforge-api-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.theforge-api.middlewares=theforge-api-strip"
    environment:
      DATABASE_URL: postgresql://theforge:theforge@theforge-db:5432/theforge
      # BullMQ: definir REDIS_URL para encolar cascada de entregables (evita timeouts HTTP largos).
      REDIS_URL: ${REDIS_URL:-redis://theforge-redis-queue:6379}
      # Obligatorio en producción; en local Dokploy sustituir por secreto fuerte.
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-replace-in-dokploy}
      # Grafo documental SDD (Cypher, MDD_Section). TheForge MCP va aparte (THEFORGE_MCP_URL).
      FALKORDB_SDD_URL: redis://theforge-falkor-sdd:6379
      FALKORDB_URL: redis://theforge-falkor-sdd:6379
      # Evaluador legacy + crítica en respuesta chat (opcional; por defecto desactivado).
      AGENT_EVALUATOR_LEGACY: ${AGENT_EVALUATOR_LEGACY:-}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_DIM: ${OPENAI_EMBEDDING_DIM:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      THEFORGE_MCP_URL: ${THEFORGE_MCP_URL:-}
      # MCP_AUTH_TOKEN: inyectar desde Environment de Dokploy (auth con Ariadne MCP).
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      # Cliente HTTP al MCP ajeno (TheForge); no confundir con Falkor SDD ni con un MCP propio.
      THEFORGE_MCP_TIMEOUT_MS: ${THEFORGE_MCP_TIMEOUT_MS:-60000}
      # P3009: si una migración queda fallida, desbloquear antes de deploy (ej. 20260319130000_agent_checkpoint_mdd_stage).
      PRISMA_RESOLVE_ROLLED_BACK: ${PRISMA_RESOLVE_ROLLED_BACK:-}
      # OTP: definir EMAIL_OTP (y SMTP*) en Dokploy / .env — único correo que recibe el código.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-0}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Único correo que puede solicitar/recibir OTP (obligatorio con NODE_ENV=production en la imagen API).
      EMAIL_OTP: ${EMAIL_OTP:-}
      # Alias retrocompatible; si falta EMAIL_OTP puedes usar solo esto.
      AUTH_ALLOWED_OTP_EMAIL: ${AUTH_ALLOWED_OTP_EMAIL:-}
      # Lista separada por comas; en Dokploy definir el/los orígenes reales del front (https://tu-dominio).
      CORS_ORIGINS: ${CORS_ORIGINS:-https://${WEB_DOMAIN:-theforge.local},http://localhost:5173,http://127.0.0.1:5173}
    depends_on:
      theforge-db:
        condition: service_healthy
      theforge-redis-queue:
        condition: service_healthy
      theforge-falkor-sdd:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      # wait-for-postgres + migrate deploy + Nest cold start
      start_period: 90s
      retries: 3

  theforge-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: theforge-web
    networks:
      - default
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.theforge-web.rule=Host(`${WEB_DOMAIN:-theforge.local}`)"
      - "traefik.http.routers.theforge-web.priority=1"
      - "traefik.http.routers.theforge-web.entrypoints=websecure"
      - "traefik.http.routers.theforge-web.tls.certResolver=letsencrypt"
      - "traefik.http.services.theforge-web.loadbalancer.server.port=80"
    depends_on:
      - theforge-api
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:80/ | head -c 1 | grep -q . || exit 1",
        ]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3

volumes:
  theforge_db_data:
  theforge_redis_queue_data:
  falkor_sdd_data:
