# Un solo contenedor para Dokploy: Postgres + API + Web (Nginx)
# Nombre del contenedor: theforge-db
# Conexión interna: DATABASE_URL=postgresql://theforge:theforge@localhost:5432/theforge

services:
  theforge-db:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: theforge-db
    environment:
      - DATABASE_URL=postgresql://theforge:theforge@localhost:5432/theforge
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY:-}
    ports:
      - "80:80"
    volumes:
      - theforge_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      - theforge-falkor

  theforge-falkor:
    image: falkordb/falkordb:latest
    container_name: theforge-falkor
    ports:
      - "6379:6379"
    volumes:
      - falkor_data:/var/lib/falkordb/data
    environment:
      - REDIS_ARGS=--appendonly yes
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  theforge_db_data:
  falkor_data:
