# Dokploy (prod): db + api + web + FalkorDB (grafo SDD documental; TheForge MCP es externo)
# Traefik en Dokploy: / → theforge-web:80 (solo estáticos); /api → theforge-api:3000 (strip path).
#
# Otros perfiles (no modifican este archivo):
#   Local full-docker:  docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
#   Coolify:            docker compose -f docker-compose.yml -f docker-compose.coolify.yml up --build
#   Ver docs/DEPLOY-COOLIFY.md y README-LOCAL.md § Opción B
# El nginx del contenedor web no hace proxy a la API (evita duplicar rutas con Traefik).
# Si falla "network dokploy-network not found", quitar la red externa (Isolated Deployments)
# default con name evita que Compose cree una red *_default extra (reduce agotamiento de address pools)
#
# ⚙️ Dokploy Webhook: cada push a master dispara auto-deploy (2024-04-30)
#
# Imágenes base: ECR Public en Dockerfiles (node/nginx). Postgres/redis abajo con override.
# Override pulls: POSTGRES_IMAGE, REDIS_IMAGE en .env si hace falta.

networks:
  default:
    name: theforge-app-network
    driver: bridge
  dokploy-network:
    external: true

services:
  theforge-db:
    image: ${POSTGRES_IMAGE:-public.ecr.aws/docker/library/postgres:15-alpine}
    container_name: theforge-db
    networks:
      - default
    environment:
      POSTGRES_USER: theforge
      POSTGRES_PASSWORD: theforge
      POSTGRES_DB: theforge
    volumes:
      - theforge_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U theforge -d theforge"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Grafo SDD (MDD, entregables, RAG agéntico). Aislado del índice de código en TheForge.
  # Cola BullMQ (cascada generate-deliverables). Obligatorio en el stack Dokploy/compose oficial:
  # sin Redis de cola, REDIS_URL vacío fuerza modo síncrono y riesgo de timeouts en cascadas largas.
  theforge-redis-queue:
    image: ${REDIS_IMAGE:-public.ecr.aws/docker/library/redis:7-alpine}
    container_name: theforge-redis-queue
    networks:
      - default
    volumes:
      - theforge_redis_queue_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  theforge-falkor-sdd:
    image: falkordb/falkordb:latest
    container_name: theforge-falkor-sdd
    networks:
      - default
    ports:
      - "6380:6379"
    volumes:
      - falkor_sdd_data:/var/lib/falkordb/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  theforge-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        BUILD_CACHE_BUST: ${BUILD_CACHE_BUST:-94}
    container_name: theforge-api
    # Carga THEFORGE_MCP_URL / MCP_* desde `.env` local sin pisar con "" si Compose no
    # tiene esas claves al interpolar `${VAR:-}`. En Dokploy: también inyecta por servicio
    # (theforge-api); si solo estaban como vars “globales” y el compose las expandía vacías,
    # el API nunca veía el valor.
    env_file:
      - path: .env
        required: false
    networks:
      - default
      - dokploy-network
    # Nest lee el entorno fusionado: variables del bloque `environment` + claves de `.env` (env_file).
    # IA BYOK: claves LLM por usuario (UI). Servidor: TOKEN_MASTER_KEYS + TOKEN_ACTIVE_KEY_VERSION.
    environment:
      DATABASE_URL: postgresql://theforge:theforge@theforge-db:5432/theforge
      # BullMQ: REDIS_URL apunta al Redis de cola (servicio siguiente). Requerido para entregables asíncronos resilientes.
      REDIS_URL: ${REDIS_URL:-redis://theforge-redis-queue:6379}
      # Obligatorio en producción; en local Dokploy sustituir por secreto fuerte.
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-replace-in-dokploy}
      # Grafo documental SDD (Cypher, MDD_Section). TheForge MCP va aparte (THEFORGE_MCP_URL).
      FALKORDB_SDD_URL: redis://theforge-falkor-sdd:6379
      FALKORDB_URL: redis://theforge-falkor-sdd:6379
      # Evaluador legacy + crítica en respuesta chat (opcional; por defecto desactivado).
      AGENT_EVALUATOR_LEGACY: ${AGENT_EVALUATOR_LEGACY:-}
      TOKEN_MASTER_KEYS: ${TOKEN_MASTER_KEYS:-}
      TOKEN_ACTIVE_KEY_VERSION: ${TOKEN_ACTIVE_KEY_VERSION:-1}
      OPENAI_EMBEDDING_DIM: ${OPENAI_EMBEDDING_DIM:-}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-}
      # Trazas LLM detalladas (cadena de modelos, runtime, chat stream): LLM_DEBUG=1
      LLM_DEBUG: ${LLM_DEBUG:-}
      # Scout (DBGA): búsqueda web vía @langchain/tavily; sin clave el Scout puede limitarse a scrape/otras rutas.
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      # THEFORGE_MCP_URL / MCP_AUTH_TOKEN / MCP_X_M2M_TOKEN: no usar ${VAR:-} aquí (quedan
      # como "" y pueden anular env_file o variables runtime). Definirlas en `.env` o en
      # Environment del servicio theforge-api en Dokploy.
      # Cliente HTTP al MCP ajeno (TheForge); no confundir con Falkor SDD ni con un MCP propio.
      THEFORGE_MCP_TIMEOUT_MS: ${THEFORGE_MCP_TIMEOUT_MS:-60000}
      # 1 = loguear JSON-RPC y cuerpo de respuesta del MCP Ariadne (verbose; no usar en prod estable).
      DEBUG_MCP: ${DEBUG_MCP:-0}
      # P3009: si una migración queda fallida, desbloquear antes de deploy (ej. 20260319130000_agent_checkpoint_mdd_stage).
      PRISMA_RESOLVE_ROLLED_BACK: ${PRISMA_RESOLVE_ROLLED_BACK:-}
      # OTP multi-usuario: el email viene en el body del request y se valida contra la tabla `User`.
      # Configura SMTP_* para envío real; en dev sin SMTP el código se loguea en stdout.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-0}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # [DEPRECATED] EMAIL_OTP / AUTH_ALLOWED_OTP_EMAIL ya no se usan; el primer admin se crea desde la UI.
      # Lista separada por comas. Por defecto incluye producción kreoint + WEB_DOMAIN + Vite local.
      CORS_ORIGINS: ${CORS_ORIGINS:-https://${WEB_DOMAIN:-theforge.local},https://theforge.kreoint.mx,http://localhost:5173,http://127.0.0.1:5173}
      # Secreto compartido para validar login MCP (POST /auth/mcp-login)
      MCP_M2M_SECRET: ${MCP_M2M_SECRET:-}
      # Webhook proxy de Hermes Agent (para notificar proyectos listos para desarrollo)
      HERMES_WEBHOOK_URL: ${HERMES_WEBHOOK_URL:-}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      # 1 = un arranque: borra ProviderInstance + UserProviderConfig (clave BYOK irrecuperable). Quitar tras deploy.
      WIPE_BYOK_ON_START: ${WIPE_BYOK_ON_START:-}
    depends_on:
      theforge-db:
        condition: service_healthy
      theforge-redis-queue:
        condition: service_healthy
      theforge-falkor-sdd:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      # CMD corre dentro del task: localhost = loopback del contenedor (Nest en :3000).
      # No usar DNS theforge-api ni 127.0.0.1 aquí — en Swarm/Dokploy el hairpin al propio servicio suele fallar
      # y 127.0.0.1 en monitor externo apunta al host, no al contenedor.
      # Traefik: GET /health (sin prefijo /api).
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      # wait-for-postgres + migrate deploy + db push + Nest cold start
      start_period: 120s
      retries: 3

  # Web estáticos (nginx :80). Traefik/Dokploy: / → theforge-web:80
  theforge-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        BUILD_CACHE_BUST: ${BUILD_CACHE_BUST:-94}
    container_name: theforge-web
    networks:
      - default
      - dokploy-network
    depends_on:
      - theforge-api
    healthcheck:
      # DNS del servicio (no 127.0.0.1 — en Dokploy apunta al host físico)
      test: ["CMD", "wget", "-q", "--spider", "http://theforge-web:80/"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3

  # MCP server — expone la API de TheForge como herramientas MCP sobre HTTP
  # Hermes / Cursor: Traefik path /mcp → POST / con header MCP_M2M_SECRET
  # Healthcheck: NO usar 127.0.0.1 en Dokploy UI (resuelve al host físico). En Advanced → Swarm
  # usar http://localhost:3000/health o confiar en el healthcheck de compose (DNS theforge-mcp).
  theforge-mcp:
    build:
      context: .
      dockerfile: packages/mcp-server/Dockerfile
      args:
        BUILD_CACHE_BUST: ${BUILD_CACHE_BUST:-94}
    container_name: theforge-mcp
    networks:
      - default
      - dokploy-network
    depends_on:
      theforge-api:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      # Apunta a la API NestJS internamente (misma red Docker)
      THEFORGE_API_URL: "http://theforge-api:3000"
      # MCP_M2M_SECRET se recibe del cliente via header HTTP — no va en env
    healthcheck:
      # Probe por localhost (loopback del contenedor en Swarm y Compose).
      # NO usar DNS theforge-mcp ni 127.0.0.1 — en Swarm DNS al propio servicio
      # puede fallar por hairpin VIP, y 127.0.0.1 en monitor externo apunta al host.
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # Adminer — gestor de BD web (auto-fill, solo falta la password)
  # Exponer en Dokploy: dominio theforge.kreoint.mx, path /adminer, puerto 8080
  theforge-adminer:
    image: adminer:4.8.1
    container_name: theforge-adminer
    networks:
      - default
      - dokploy-network
    depends_on:
      theforge-db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: theforge-db
      ADMINER_DEFAULT_USERNAME: theforge
      ADMINER_DEFAULT_DRIVER: pgsql
      ADMINER_DEFAULT_DB: theforge
      ADMINER_DESIGN: nette
    expose:
      - "8080"
    healthcheck:
      # DNS del servicio (no 127.0.0.1). Imagen adminer incluye wget (busybox).
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://theforge-adminer:8080/ 2>/dev/null | grep -qi adminer || exit 1",
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  theforge_db_data:
  theforge_redis_queue_data:
  falkor_sdd_data:
