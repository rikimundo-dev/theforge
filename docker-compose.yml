# Dokploy: db + api + web + FalkorDB (grafo SDD documental; TheForge MCP es externo)
# Traefik en Dokploy: / → theforge-web:80 (solo estáticos); /api → theforge-api:3000 (strip path).
# El nginx del contenedor web no hace proxy a la API (evita duplicar rutas con Traefik).
# Si falla "network dokploy-network not found", quitar la red externa (Isolated Deployments)
# default con name evita que Compose cree una red *_default extra (reduce agotamiento de address pools)
#
# ⚙️ Dokploy Webhook: cada push a master dispara auto-deploy (2024-04-30)

networks:
  default:
    name: theforge-app-network
    driver: bridge
  dokploy-network:
    external: true

services:
  theforge-db:
    image: postgres:15-alpine
    container_name: theforge-db
    networks:
      - default
    environment:
      POSTGRES_USER: theforge
      POSTGRES_PASSWORD: theforge
      POSTGRES_DB: theforge
    volumes:
      - theforge_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U theforge -d theforge"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Grafo SDD (MDD, entregables, RAG agéntico). Aislado del índice de código en TheForge.
  # Cola BullMQ (cascada generate-deliverables). Obligatorio en el stack Dokploy/compose oficial:
  # sin Redis de cola, REDIS_URL vacío fuerza modo síncrono y riesgo de timeouts en cascadas largas.
  theforge-redis-queue:
    image: redis:7-alpine
    container_name: theforge-redis-queue
    networks:
      - default
    volumes:
      - theforge_redis_queue_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  theforge-falkor-sdd:
    image: falkordb/falkordb:latest
    container_name: theforge-falkor-sdd
    networks:
      - default
    ports:
      - "6380:6379"
    volumes:
      - falkor_sdd_data:/var/lib/falkordb/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  theforge-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: theforge-api
    # Carga THEFORGE_MCP_URL / MCP_* desde `.env` local sin pisar con "" si Compose no
    # tiene esas claves al interpolar `${VAR:-}`. En Dokploy: también inyecta por servicio
    # (theforge-api); si solo estaban como vars “globales” y el compose las expandía vacías,
    # el API nunca veía el valor.
    env_file:
      - path: .env
        required: false
    networks:
      - default
      - dokploy-network
    # Nest lee el entorno fusionado: variables del bloque `environment` + claves de `.env` (env_file).
    # IA: define al menos OPENROUTER_API_KEY en `.env` o en Dokploy (Environment del servicio). Aliases: AI_API_KEY, OPENAI_API_KEY.
    environment:
      DATABASE_URL: postgresql://theforge:theforge@theforge-db:5432/theforge
      # BullMQ: REDIS_URL apunta al Redis de cola (servicio siguiente). Requerido para entregables asíncronos resilientes.
      REDIS_URL: ${REDIS_URL:-redis://theforge-redis-queue:6379}
      # Obligatorio en producción; en local Dokploy sustituir por secreto fuerte.
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-replace-in-dokploy}
      # Grafo documental SDD (Cypher, MDD_Section). TheForge MCP va aparte (THEFORGE_MCP_URL).
      FALKORDB_SDD_URL: redis://theforge-falkor-sdd:6379
      FALKORDB_URL: redis://theforge-falkor-sdd:6379
      # Evaluador legacy + crítica en respuesta chat (opcional; por defecto desactivado).
      AGENT_EVALUATOR_LEGACY: ${AGENT_EVALUATOR_LEGACY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-}
      OPENROUTER_CHAT_MODEL: ${OPENROUTER_CHAT_MODEL:-}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-}
      OPENROUTER_EMBEDDING_API_KEY: ${OPENROUTER_EMBEDDING_API_KEY:-}
      AI_API_KEY: ${AI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_DIM: ${OPENAI_EMBEDDING_DIM:-}
      LLM_EMBEDDINGS_PROVIDER: ${LLM_EMBEDDINGS_PROVIDER:-}
      OPENAI_EMBEDDING_API_KEY: ${OPENAI_EMBEDDING_API_KEY:-}
      # Scout (DBGA): búsqueda web vía @langchain/tavily; sin clave el Scout puede limitarse a scrape/otras rutas.
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      # THEFORGE_MCP_URL / MCP_AUTH_TOKEN / MCP_X_M2M_TOKEN: no usar ${VAR:-} aquí (quedan
      # como "" y pueden anular env_file o variables runtime). Definirlas en `.env` o en
      # Environment del servicio theforge-api en Dokploy.
      # Cliente HTTP al MCP ajeno (TheForge); no confundir con Falkor SDD ni con un MCP propio.
      THEFORGE_MCP_TIMEOUT_MS: ${THEFORGE_MCP_TIMEOUT_MS:-60000}
      # 1 = loguear JSON-RPC y cuerpo de respuesta del MCP Ariadne (verbose; no usar en prod estable).
      DEBUG_MCP: ${DEBUG_MCP:-0}
      # P3009: si una migración queda fallida, desbloquear antes de deploy (ej. 20260319130000_agent_checkpoint_mdd_stage).
      PRISMA_RESOLVE_ROLLED_BACK: ${PRISMA_RESOLVE_ROLLED_BACK:-}
      # OTP: definir EMAIL_OTP (y SMTP*) en Dokploy / .env — único correo que recibe el código.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-0}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Único correo que puede solicitar/recibir OTP (obligatorio con NODE_ENV=production en la imagen API).
      EMAIL_OTP: ${EMAIL_OTP:-}
      # Alias retrocompatible; si falta EMAIL_OTP puedes usar solo esto.
      AUTH_ALLOWED_OTP_EMAIL: ${AUTH_ALLOWED_OTP_EMAIL:-}
      # Lista separada por comas. Por defecto incluye producción kreoint + WEB_DOMAIN + Vite local.
      CORS_ORIGINS: ${CORS_ORIGINS:-https://${WEB_DOMAIN:-theforge.local},https://theforge.kreoint.mx,http://localhost:5173,http://127.0.0.1:5173}
      # Secreto compartido para validar login MCP (POST /auth/mcp-login)
      MCP_M2M_SECRET: ${MCP_M2M_SECRET:-}
    depends_on:
      theforge-db:
        condition: service_healthy
      theforge-redis-queue:
        condition: service_healthy
      theforge-falkor-sdd:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      # wait-for-postgres + migrate deploy + Nest cold start
      start_period: 90s
      retries: 3

  theforge-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: theforge-web
    networks:
      - default
      - dokploy-network
    depends_on:
      - theforge-api
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:80/ | head -c 1 | grep -q . || exit 1",
        ]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3

  # MCP server — expone la API de TheForge como herramientas MCP sobre HTTP
  # Hermes se conecta vía URL (StreamableHTTP) enviando MCP_M2M_SECRET en header
  theforge-mcp:
    build:
      context: packages/mcp-server
      dockerfile: Dockerfile
    container_name: theforge-mcp
    networks:
      - default
      - dokploy-network
    depends_on:
      theforge-api:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      # Apunta a la API NestJS internamente (misma red Docker)
      THEFORGE_API_URL: "http://theforge-api:3000"
      # MCP_M2M_SECRET se recibe del cliente via header HTTP — no va en env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${PORT:-3000}/ | head -c 1 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  theforge_db_data:
  theforge_redis_queue_data:
  falkor_sdd_data:
